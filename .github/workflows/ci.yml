name: Observability Stack CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go 1.22
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: false
      - name: Test go-api
        working-directory: apps/go-api
        run: |
          go mod tidy
          go vet ./...
          go test -v -race -count=1 ./...
      - name: Test exchange-rate-service compilation
        working-directory: apps/exchange-rate-service
        run: |
          go mod tidy
          go vet ./...
          go build -o /dev/null .

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build go-api image
        run: docker build -t go-api-test apps/go-api/
      - name: Build exchange-rate-service image
        run: docker build -t exchange-rate-test apps/exchange-rate-service/

  config-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Prometheus config
        run: |
          docker run --rm --entrypoint promtool \
            -v $(pwd)/infra/prometheus:/etc/prometheus \
            prom/prometheus:v2.50.1 \
            check config /etc/prometheus/prometheus.yml
      - name: Validate alert rules
        run: |
          docker run --rm --entrypoint promtool \
            -v $(pwd)/infra/prometheus:/etc/prometheus \
            prom/prometheus:v2.50.1 \
            check rules /etc/prometheus/alerts.yml
